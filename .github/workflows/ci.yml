name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Vite/Vitest artifacts
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            node_modules/.vitest
            .vitest
          key: ${{ runner.os }}-vite-vitest-${{ hashFiles('package-lock.json', 'vite.config.ts', 'vitest.config.*', 'src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-vite-vitest-${{ hashFiles('package-lock.json', 'vite.config.ts', 'vitest.config.*') }}
            ${{ runner.os }}-vite-vitest-${{ hashFiles('package-lock.json') }}
            ${{ runner.os }}-vite-vitest-

      - name: Lint
        run: npm run lint

      - name: Run tests
        timeout-minutes: 12
        run: npx vitest run

      - name: Build
        run: npm run build

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Nodex - Organic Collaboration</title>
    <meta name="description" content="Nodex - A collaborative platform with hierarchical tasks, smart filtering, and team coordination">
    <meta name="author" content="Mostr" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script>
      (function () {
        var key = "nodex.theme.mode";
        var raw = null;
        try {
          raw = localStorage.getItem(key);
        } catch (_) {}

        var mode = raw === "light" || raw === "dark" || raw === "auto" ? raw : "auto";
        if (mode !== raw) {
          try {
            localStorage.setItem(key, mode);
          } catch (_) {}
        }

        var prefersDark = false;
        try {
          prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        } catch (_) {}

        var effectiveTheme = mode === "auto" ? (prefersDark ? "dark" : "light") : mode;
        var root = document.documentElement;
        root.classList.toggle("dark", effectiveTheme === "dark");
        root.style.colorScheme = effectiveTheme;
      })();
    </script>
